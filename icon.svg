<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#009e70"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#00c896" stroke-width="3" opacity="0.15"/>
  <!-- Chart grid lines -->
  <g stroke="#00c896" stroke-width="1" opacity="0.08">
    <line x1="80" y1="384" x2="432" y2="384"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="192" x2="432" y2="192"/>
    <line x1="80" y1="128" x2="432" y2="128"/>
  </g>
  <!-- Lie detector needle / chart polyline -->
  <polyline points="80,350 140,290 180,310 220,180 260,200 300,110 340,130 380,90 432,105"
            fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Needle pulse dot -->
  <circle cx="432" cy="105" r="10" fill="#00c896" opacity="0.4">
    <animate attributeName="r" values="10;18;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="432" cy="105" r="6" fill="#00c896"/>
  <!-- LD letters -->
  <text x="256" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="700"
        fill="#00c896" text-anchor="middle" letter-spacing="12">LD</text>
</svg>
